name: kali-mcp

services:
  kali-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: kali-mcp-server
    container_name: kali-mcp-server
    # Root required for raw sockets (nmap SYN scans, tcpdump, arpspoof, etc.)
    user: "0:0"
    ports:
      - "8000:8000"
    volumes:
      - ./sessions:/app/sessions:rw
    restart: unless-stopped
